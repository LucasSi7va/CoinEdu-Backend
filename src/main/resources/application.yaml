spring:
  application:
    name: CoinEdu

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis



  datasource:
    #url: jdbc:h2:mem:apocalipse;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    url: jdbc:postgresql://localhost:5432/CoinEdu
    driver-class-name: org.postgresql.Driver
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect